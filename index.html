<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <h1>Premium Quiz App</h1>
        <span class="premium-badge">Premium</span>
      </div>
      <p class="subtitle">Sharpen your skills with a premium, responsive quiz experience.</p>
    </header>

    <main class="quiz-card">
      <div class="quiz-header">
        <p id="progress" class="progress">Question 1 of 5</p>
        <h2 id="question">Loading question...</h2>
      </div>

      <div id="answersbuttons" class="answers-grid"></div>
    </main>

    <div class="controls">
      <button id="next-btn" class="btn primary" disabled>Next</button>
    </div>
  </div>
</body>
</html>
